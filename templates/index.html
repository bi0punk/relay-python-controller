<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control de Relés Arduino</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-4">
    <h1 class="text-center">Control de Relés Arduino</h1>

    <div class="row mt-4">
      {% for cmd in commands %}
      {% if cmd.startswith('on') or cmd.startswith('off') %}
      <div class="col-md-4 mb-3">
        <div class="card">
          <div class="card-body text-center">
            <h5 class="card-title">Relé {{ cmd[2:] }}</h5>
            <button class="btn btn-lg w-100 {% if cmd.startswith('on') %}btn-success{% else %}btn-danger{% endif %}"
                    onclick="sendCommand('{{ cmd }}')">
              {{ 'Encender' if cmd.startswith('on') else 'Apagar' }}
            </button>
          </div>
        </div>
      </div>
      {% endif %}
      {% endfor %}
    </div>

    <div class="row mt-2">
      <div class="col-md-6 mb-3">
        <button class="btn btn-info w-100" onclick="sendCommand('read_all')">Leer todos los sensores</button>
      </div>
      <div class="col-md-6 mb-3">
        <button class="btn btn-info w-100" onclick="sendCommand('read_temp')">Leer temperatura</button>
      </div>
    </div>

    <div id="response" class="mt-3"></div>
  </div>

  <script>
    const API_TOKEN = "{{ api_token }}";

    function sendCommand(cmd) {
      fetch("/api/command", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-API-Token": API_TOKEN
        },
        body: JSON.stringify({ command: cmd })
      })
      .then(r => r.json())
      .then(data => {
        const div = document.getElementById("response");
        if (data.error) {
          div.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        } else {
          div.innerHTML = `<div class="alert alert-success">Comando: ${data.command}<br>Respuesta: ${data.response}</div>`;
        }
      })
      .catch(err => {
        document.getElementById("response").innerHTML = `<div class="alert alert-danger">Error: ${err}</div>`;
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
